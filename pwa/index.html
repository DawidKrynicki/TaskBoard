<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskBoard PWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <h1>Mój TaskBoard</h1>
        
        <div class="add-task-section">
            <input type="text" id="task-title" placeholder="Tytuł zadania..." required>
            <input type="text" id="task-desc" placeholder="Opis (opcjonalnie)...">
            <button onclick="addTask()">Dodaj zadanie</button>
        </div>

        <!-- Strefy Drag & Drop dla kolumn -->
        <div class="kanban-board">
            <div class="column" ondrop="drop(event, 'To Do')" ondragover="allowDrop(event)">
                <h2>Do zrobienia</h2>
                <div class="tasks-list" id="todo-list"></div>
            </div>
            <div class="column" ondrop="drop(event, 'In Progress')" ondragover="allowDrop(event)">
                <h2>W trakcie</h2>
                <div class="tasks-list" id="inprogress-list"></div>
            </div>
            <div class="column" ondrop="drop(event, 'Done')" ondragover="allowDrop(event)">
                <h2>Zrobione</h2>
                <div class="tasks-list" id="done-list"></div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
