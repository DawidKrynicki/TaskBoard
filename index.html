<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskBoard PWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="login-screen" class="container" style="text-align: center; margin-top: 50px;">
        <h1>Zaloguj się</h1>
        <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
            <input type="text" id="login-username" placeholder="Login (admin)" required style="padding: 10px;">
            <input type="password" id="login-password" placeholder="Hasło (haslo123)" required style="padding: 10px;">
            <button onclick="loginUser()" style="padding: 10px; cursor: pointer;">Zaloguj</button>
            <p id="login-error" style="color: red; display: none;">Błędne dane logowania!</p>
        </div>
    </div>

    <div id="app-screen" class="container" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Mój TaskBoard</h1>
            <button onclick="logoutUser()" style="background-color: #ff4d4d; color: white; border: none; padding: 5px 15px; cursor: pointer; border-radius: 4px;">Wyloguj</button>
        </div>
        
        <div class="add-task-section">
            <input type="text" id="task-title" placeholder="Tytuł zadania..." required>
            <input type="text" id="task-desc" placeholder="Opis (opcjonalnie)...">
            <button onclick="addTask()">Dodaj zadanie</button>
        </div>

        <div class="kanban-board">
            <div class="column" ondrop="drop(event, 'To Do')" ondragover="allowDrop(event)">
                <h2>Do zrobienia</h2>
                <div class="tasks-list" id="todo-list"></div>
            </div>
            <div class="column" ondrop="drop(event, 'In Progress')" ondragover="allowDrop(event)">
                <h2>W trakcie</h2>
                <div class="tasks-list" id="inprogress-list"></div>
            </div>
            <div class="column" ondrop="drop(event, 'Done')" ondragover="allowDrop(event)">
                <h2>Zrobione</h2>
                <div class="tasks-list" id="done-list"></div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
